name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 如果你使用其他分支，请修改为实际分支名

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 与你本地 Node.js 版本一致

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build  # 这会执行 hexo generate，生成到 public 目录

      - name: Deploy to gaogzhen.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}  # 需要使用你创建的 token
          publish_dir: ./public
          external_repository: gaogzhen/gaogzhen.github.io  # 目标仓库
          publish_branch: main  # 目标分支，通常为 main
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy from ${{ github.repository }}@${{ github.sha }}'